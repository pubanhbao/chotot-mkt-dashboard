name: Weekly Data Sync + Deploy

on:
  schedule:
    # Every Monday 11:00 AM Vietnam time (UTC+7 = 04:00 UTC)
    - cron: '0 4 * * 1'
  workflow_dispatch:   # Manual trigger via GitHub UI

# gh-pages branch approach — more reliable than native Pages artifact
permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Sync data from BigQuery + Google Sheets ──────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install google-cloud-bigquery google-auth requests pandas

      - name: Run data sync script
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SHEETS_CSV_URL: ${{ secrets.SHEETS_CSV_URL }}
          MTM_CSV_URL: ${{ secrets.MTM_CSV_URL }}
        run: python scripts/sync_data.py

      # ── 2. Commit updated data.json to main branch ───────────────────
      - name: Commit data.json
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data.json
          git diff --staged --quiet && echo "No data changes" || \
            git commit -m "data: sync $(date -u +'%Y-%m-%d %H:%M UTC') [auto]"

      # ── 3. Build React dashboard ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # ── 4. Push dist → gh-pages branch (GitHub Pages serves this) ───
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true        # clean gh-pages branch every deploy
          commit_message: "deploy: ${{ github.sha }}"

      # ── 5. Push main branch (with updated data.json) ─────────────────
      - name: Push main
        run: git push origin main
